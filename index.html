<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lean Simulator — Interactive Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f4f4f4;
    }

    .board {
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .column {
        width: 30%;
        min-height: 500px;
        background: #ffffff;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.15);
        position: relative;
    }

    .column-title {
        text-align: center;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* Sticky note base style */
    .note {
        width: 120px;
        padding: 15px;
        position: absolute;
        cursor: grab;
        user-select: none;
        border-radius: 6px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        touch-action: none;
        transition: transform 0.1s ease;
    }

    /* Mixed colors */
    .yellow { background: #fff475; }
    .blue { background: #a7c7ff; }
    .pink { background: #ffb3c6; }
    .green { background: #b7f7b3; }

    /* Mixed shapes */
    .rounded { border-radius: 12px; }
    .torn { border-bottom: 8px solid rgba(0,0,0,0.15); }
    .curl { border-top-right-radius: 2px; transform: rotate(0deg); }

</style>
</head>

<body>

<h2 style="text-align:center; margin-bottom:20px;">Interactive Sticky‑Note Test</h2>

<div class="board">
    <div class="column" id="col1">
        <div class="column-title">COLUMN 1</div>
    </div>

    <div class="column" id="col2">
        <div class="column-title">COLUMN 2</div>
    </div>

    <div class="column" id="col3">
        <div class="column-title">COLUMN 3</div>
    </div>
</div>

<!-- Sticky Notes -->
<div class="note yellow rounded" style="top:120px; left:40px;">Note A</div>
<div class="note blue torn" style="top:200px; left:60px;">Note B</div>
<div class="note pink curl" style="top:150px; left:250px;">Note C</div>
<div class="note green rounded" style="top:300px; left:200px;">Note D</div>

<script>
let activeNote = null;
let offsetX = 0;
let offsetY = 0;

function startDrag(e) {
    activeNote = e.target;
    activeNote.style.transition = "none";

    const rect = activeNote.getBoundingClientRect();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    activeNote.style.transform = "rotate(3deg)";
}

function drag(e) {
    if (!activeNote) return;

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    activeNote.style.left = (clientX - offsetX) + "px";
    activeNote.style.top = (clientY - offsetY) + "px";
}

function endDrag() {
    if (!activeNote) return;

    activeNote.style.transform = "rotate(0deg)";
    activeNote = null;
}

document.querySelectorAll(".note").forEach(note => {
    note.addEventListener("mousedown", startDrag);
    note.addEventListener("touchstart", startDrag);

    window.addEventListener("mousemove", drag);
    window.addEventListener("touchmove", drag);

    window.addEventListener("mouseup", endDrag);
    window.addEventListener("touchend", endDrag);
});
</script>

</body>
</html>
